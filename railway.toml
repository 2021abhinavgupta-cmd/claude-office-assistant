[build]
  builder = "NIXPACKS"

[deploy]
  startCommand = "gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --worker-class sync --keep-alive 75"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 3
