[build]
  builder = "NIXPACKS"

[deploy]
  startCommand = "gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --worker-class gevent --keep-alive 75"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 3

[volumes]
  "web-volume" = "/app/logs"
