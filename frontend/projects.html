async function insertSheetRow(clientId, refTaskId, position) {
  const client = allData.clients.find(c => String(c.id) === String(clientId));
  if (!client) return;
  const isNotionClient = notionMode && !!client.notion_id;
  const endpoint = isNotionClient ? `${API}/api/notion/tasks` : `${API}/api/tasks`;
  try {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        user_id: UID, client_id: isNotionClient ? client.notion_id : clientId, client_name: client.name,
        title: "[Post] New Idea", assigned_to: "", due_date: "", service: "Social Media", status: "not_started"
      })
    });
    const d = await res.json();
    if (!d.success) { toast(d.error || "Failed to add row", "err"); return; }
    const newId = isNotionClient ? (d.notion_id || Date.now()) : d.task_id;
    const newTask = { id: newId, notion_id: isNotionClient ? d.notion_id : null, title: "[Post] New Idea", service: "Social Media", status: "not_started" };

    client.tasks = client.tasks || [];
    const refIdx = client.tasks.findIndex(t => String(t.id) === String(refTaskId));
    const insertAt = refIdx === -1 ? 0 : (position === 'above' ? refIdx : refIdx + 1);
    client.tasks.splice(insertAt, 0, newTask);

    let order = [];
    try { order = JSON.parse(localStorage.getItem(`sheetsOrder_${clientId}`)) || []; } catch(e){}
    const orderIdx = order.indexOf(String(refTaskId));
    order.splice(orderIdx === -1 ? order.length : (position === 'above' ? orderIdx : orderIdx + 1), 0, String(newId));
    localStorage.setItem(`sheetsOrder_${clientId}`, JSON.stringify(order));

    toast("Row added");
    renderClientSheets(clientId);
  } catch (err) {
    console.error(err);
    toast("Error adding row", "err");
  }
}

async function duplicateSheetRow(clientId, taskId) {
  const client = allData.clients.find(c => String(c.id) === String(clientId));
  if (!client) return;
  const src = (client.tasks||[]).find(t => String(t.id) === String(taskId));
  if (!src) return;
  const isNotionClient = notionMode && !!client.notion_id;
  const createEndpoint = isNotionClient ? `${API}/api/notion/tasks` : `${API}/api/tasks`;
  try {
    const res = await fetch(createEndpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        user_id: UID, client_id: isNotionClient ? client.notion_id : clientId, client_name: client.name,
        title: src.title || "[Post] New Idea", assigned_to: src.assigned_to || "", due_date: src.due_date || "",
        service: "Social Media", status: src.status || "not_started"
      })
    });
    const d = await res.json();
    if (!d.success) { toast(d.error || "Failed to duplicate row", "err"); return; }
    const newId = isNotionClient ? (d.notion_id || Date.now()) : d.task_id;

    if (src.description || src.creation_date) {
      const patchEndpoint = isNotionClient ? `${API}/api/notion/tasks/${newId}` : `${API}/api/sqlite/tasks/${newId}`;
      await fetch(patchEndpoint, {
        method: "PATCH", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ submission_note: src.description || "", creation_date: src.creation_date || "" })
      }).catch(()=>{});
    }

    const newTask = { id: newId, notion_id: isNotionClient ? d.notion_id : null, title: src.title, service: "Social Media", status: src.status, assigned_to: src.assigned_to, due_date: src.due_date, description: src.description, creation_date: src.creation_date };
    client.tasks = client.tasks || [];
    const refIdx = client.tasks.findIndex(t => String(t.id) === String(taskId));
    client.tasks.splice(refIdx === -1 ? 0 : refIdx + 1, 0, newTask);

    let order = [];
    try { order = JSON.parse(localStorage.getItem(`sheetsOrder_${clientId}`)) || []; } catch(e){}
    const orderIdx = order.indexOf(String(taskId));
    order.splice(orderIdx === -1 ? order.length : orderIdx + 1, 0, String(newId));
    localStorage.setItem(`sheetsOrder_${clientId}`, JSON.stringify(order));

    toast("Row duplicated");
    renderClientSheets(clientId);
  } catch (err) {
    console.error(err);
    toast("Error duplicating row", "err");
  }
}

function applyPastedCellValue(td, value) {
  value = (value||'').trim();
  const select = td.querySelector('select');
  if (select) {
    const opt = Array.from(select.options).find(o => o.textContent.trim().toLowerCase() === value.toLowerCase() || o.value.toLowerCase() === value.toLowerCase());
    if (opt) select.value = opt.value; else if (!value) select.selectedIndex = 0;
    return;
  }
  const dateInput = td.querySelector('input[type="date"]');
  if (dateInput) { dateInput.value = value ? parseFlexibleDate(value) : ''; return; }
  const msWrap = td.querySelector('.ms-wrap');
  if (msWrap) {
    const names = value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
    msWrap.querySelectorAll('.ms-chk').forEach(chk => {
      const label = chk.parentElement.textContent.trim().toLowerCase();
      chk.checked = names.length > 0 && names.some(n => label.includes(n) || n.includes(label));
    });
    const firstChk = msWrap.querySelector('.ms-chk');
    if (firstChk) updateSheetMsDisplay(firstChk);
    return;
  }
  if (td.isContentEditable) td.textContent = value;
}

function parseFlexibleDate(value) {
  value = (value||'').trim();
  if (!value) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
  const dm = value.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (dm) return `${dm[3]}-${dm[2].padStart(2,'0')}-${dm[1].padStart(2,'0')}`; // assume DD/MM/YYYY (app is India/IST-based)
  const d = new Date(value);
  if (!isNaN(d.getTime())) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  return '';
}

function clearSheetCell(clientId, taskId, colIndex) {
  const tr = document.querySelector(`tr.sheet-row[data-task-id="${CSS.escape(String(taskId))}"]`);
  if (!tr) return;
  const td = tr.cells[colIndex];
  if (!td) return;
  applyPastedCellValue(td, '');
  const focusEl = td.querySelector('input,select,[contenteditable]') || td;
  saveSheetRow(taskId, focusEl, clientId);
}

function sheetTrClientId(tr) {
  const container = tr.closest('[id^="csheets-"]');
  return container ? container.id.replace('csheets-','') : null;
}

// ── Paste from Excel/Google Sheets: tab-separated columns, newline-separated rows ──
document.addEventListener('paste', (e) => {
  const td = e.target.closest('.c-sheets td');
  if (!td) return;
  const text = (e.clipboardData || window.clipboardData).getData('text/plain');
  if (!text) return;
  const isMultiCell = /\t|\n/.test(text);
  if (!td.isContentEditable && !isMultiCell) return; // single-value paste into date/select: let native behavior handle it

  const tr = td.closest('tr.sheet-row');
  if (!tr) return;
  e.preventDefault();
  e.stopImmediatePropagation(); // there's an older, unrelated document-level paste listener further down that force-plain-texts contenteditables — without this it double-processes the same paste

  const clientId = sheetTrClientId(tr);
  const rows = text.replace(/\r/g,'').split('\n').filter((r,i,arr)=> !(i===arr.length-1 && r===''));
  const startColIndex = td.cellIndex;
  let curTr = tr;
  let rowsFilled = 0;

  for (let r = 0; r < rows.length && curTr; r++) {
    const cols = rows[r].split('\t');
    for (let c = 0; c < cols.length; c++) {
      const colIndex = startColIndex + c;
      if (colIndex >= curTr.cells.length) break;
      applyPastedCellValue(curTr.cells[colIndex], cols[c]);
    }
    const taskId = curTr.dataset.taskId;
    if (taskId) {
      const anchorCell = curTr.cells[startColIndex];
      const focusEl = anchorCell ? (anchorCell.querySelector('input,select,[contenteditable]') || anchorCell) : null;
      if (focusEl) saveSheetRow(taskId, focusEl, clientId);
    }
    rowsFilled++;
    curTr = curTr.nextElementSibling;
  }
  toast(`Pasted ${rowsFilled} row${rowsFilled===1?'':'s'}.${rows.length>rowsFilled ? ' (Add more rows to paste the rest.)' : ''}`);
});

function sheetCellTextValue(td) {
  const select = td.querySelector('select');
  if (select) return select.options[select.selectedIndex] ? select.options[select.selectedIndex].textContent.trim() : '';
  const dateInput = td.querySelector('input[type="date"]');
  if (dateInput) return dateInput.value || '';
  const msWrap = td.querySelector('.ms-wrap');
  if (msWrap) return Array.from(msWrap.querySelectorAll('.ms-chk:checked')).map(c => c.parentElement.textContent.trim()).join(', ');
  return (td.textContent || '').trim();
}

// ── Cell selection: click-drag or shift-click to select a block, for copy/clear ──
let sheetSel = null; // { tbody, r1, c1, r2, c2 }
let sheetSelDragging = false;

function sheetCellPos(td) {
  const tr = td.closest('tr.sheet-row');
  if (!tr) return null;
  const tbody = tr.parentElement;
  return { tbody, rIdx: Array.from(tbody.children).indexOf(tr), cIdx: td.cellIndex };
}

function clearSheetSelectionVisual() {
  document.querySelectorAll('td.sheet-cell-selected').forEach(el => el.classList.remove('sheet-cell-selected'));
}

function applySheetSelectionVisual() {
  clearSheetSelectionVisual();
  if (!sheetSel) return;
  const { tbody, r1, c1, r2, c2 } = sheetSel;
  const rowMin = Math.min(r1,r2), rowMax = Math.max(r1,r2), colMin = Math.min(c1,c2), colMax = Math.max(c1,c2);
  for (let r = rowMin; r <= rowMax; r++) {
    const tr = tbody.children[r];
    if (!tr) continue;
    for (let c = colMin; c <= colMax; c++) { const td = tr.cells[c]; if (td) td.classList.add('sheet-cell-selected'); }
  }
}

document.addEventListener('mousedown', (e) => {
  const td = e.target.closest('.c-sheets td');
  if (!td || td.cellIndex === 0) { sheetSel = null; clearSheetSelectionVisual(); return; }
  const pos = sheetCellPos(td);
  if (!pos) return;
  sheetSelDragging = true;
  sheetSel = { tbody: pos.tbody, r1: pos.rIdx, c1: pos.cIdx, r2: pos.rIdx, c2: pos.cIdx };
  applySheetSelectionVisual();
});
document.addEventListener('mouseover', (e) => {
  if (!sheetSelDragging || !sheetSel) return;
  const td = e.target.closest('.c-sheets td');
  if (!td) return;
  const pos = sheetCellPos(td);
  if (!pos || pos.tbody !== sheetSel.tbody) return;
  sheetSel.r2 = pos.rIdx; sheetSel.c2 = pos.cIdx;
  applySheetSelectionVisual();
});
document.addEventListener('mouseup', () => { sheetSelDragging = false; });
document.addEventListener('click', (e) => {
  const td = e.target.closest('.c-sheets td');
  if (!td) { sheetSel = null; clearSheetSelectionVisual(); return; }
  if (e.shiftKey && sheetSel) {
    const pos = sheetCellPos(td);
    if (pos && pos.tbody === sheetSel.tbody) { sheetSel.r2 = pos.rIdx; sheetSel.c2 = pos.cIdx; applySheetSelectionVisual(); }
  }
});

document.addEventListener('copy', (e) => {
  if (!sheetSel) return;
  const isSingleCell = sheetSel.r1 === sheetSel.r2 && sheetSel.c1 === sheetSel.c2;
  const active = document.activeElement;
  if (isSingleCell && active && (active.tagName === 'INPUT' || active.isContentEditable)) {
    const sel = window.getSelection();
    if (sel && !sel.isCollapsed) return; // user has a real text selection mid-cell — let native copy handle it
  }
  const { tbody, r1, c1, r2, c2 } = sheetSel;
  const rowMin = Math.min(r1,r2), rowMax = Math.max(r1,r2), colMin = Math.min(c1,c2), colMax = Math.max(c1,c2);
  const lines = [];
  for (let r = rowMin; r <= rowMax; r++) {
    const tr = tbody.children[r];
    if (!tr) continue;
    const cols = [];
    for (let c = colMin; c <= colMax; c++) { const td = tr.cells[c]; cols.push(td ? sheetCellTextValue(td) : ''); }
    lines.push(cols.join('\t'));
  }
  e.clipboardData.setData('text/plain', lines.join('\n'));
  e.preventDefault();
  toast(`Copied ${rowMax-rowMin+1} row(s).`);
});

function clearSheetSelectionCells() {
  if (!sheetSel) return;
  const { tbody, r1, c1, r2, c2 } = sheetSel;
  const rowMin = Math.min(r1,r2), rowMax = Math.max(r1,r2), colMin = Math.min(c1,c2), colMax = Math.max(c1,c2);
  const container = tbody.closest('[id^="csheets-"]');
  const clientId = container ? container.id.replace('csheets-','') : null;
  for (let r = rowMin; r <= rowMax; r++) {
    const tr = tbody.children[r];
    if (!tr) continue;
    const taskId = tr.dataset.taskId;
    for (let c = colMin; c <= colMax; c++) {
      if (c === 0) continue; // never touch the checkbox/# column via bulk clear
      const td = tr.cells[c];
      if (td) applyPastedCellValue(td, '');
    }
    if (taskId) {
      const anchorCell = tr.cells[Math.max(colMin,1)];
      const focusEl = anchorCell ? (anchorCell.querySelector('input,select,[contenteditable]') || anchorCell) : null;
      if (focusEl) saveSheetRow(taskId, focusEl, clientId);
    }
  }
  toast('Cleared selection.');
}

// ── Keyboard: Ctrl+Z undo delete, boundary-aware Left/Right arrow cell nav, ──
// ── Up/Down arrow nav, Delete/Backspace bulk-clear (Enter left as native) ──
function focusSheetCellAt(tr, colIndex) {
  if (!tr) return;
  const td = tr.cells[colIndex];
  if (!td) return;
  const focusable = td.querySelector('input, select, [contenteditable="true"]') || (td.isContentEditable ? td : null);
  if (focusable) focusable.focus();
}

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && pendingRowDelete) {
    const active = document.activeElement;
    const isEditable = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable);
    if (!isEditable) { e.preventDefault(); undoRowDelete(); return; }
  }

  const td = e.target.closest('.c-sheets td');
  if (!td) return;
  const tr = td.closest('tr.sheet-row');
  if (!tr) return;
  const colIndex = td.cellIndex;

  if (e.target.isContentEditable && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
    e.preventDefault();
    focusSheetCellAt(e.key === 'ArrowUp' ? tr.previousElementSibling : tr.nextElementSibling, colIndex);
  } else if (e.target.isContentEditable && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    if (!range.collapsed) return;
    const textLen = (e.target.textContent || '').length;
    if (e.key === 'ArrowLeft' && range.startOffset === 0) { e.preventDefault(); focusSheetCellAt(tr, colIndex - 1); }
    else if (e.key === 'ArrowRight' && range.startOffset === textLen) { e.preventDefault(); focusSheetCellAt(tr, colIndex + 1); }
  } else if ((e.key === 'Delete' || e.key === 'Backspace') && sheetSel) {
    const isSingleCell = sheetSel.r1 === sheetSel.r2 && sheetSel.c1 === sheetSel.c2;
    if (!isSingleCell) { e.preventDefault(); clearSheetSelectionCells(); }
  }
});

function saveColName(clientId, defaultName, newName) {
  newName = newName.trim();
  let customHeaders = {};
  try { customHeaders = JSON.parse(localStorage.getItem(`sheetsCols_${clientId}`)) || {}; } catch(e){}
  
  // Also save it to a global fallback just in case they want it to apply to new clients too
  let globalHeaders = {};
  try { globalHeaders = JSON.parse(localStorage.getItem(`sheetsCols_global`)) || {}; } catch(e){}
  
  if (newName === defaultName || newName === "") {
    delete customHeaders[defaultName];
    delete globalHeaders[defaultName];
  } else {
    customHeaders[defaultName] = newName;
    globalHeaders[defaultName] = newName;
  }
  
  localStorage.setItem(`sheetsCols_${clientId}`, JSON.stringify(customHeaders));
  localStorage.setItem(`sheetsCols_global`, JSON.stringify(globalHeaders));
  
  toast("Column name updated");
}

async function saveSheetRow(taskId, cellElem, clientId) {
  const tr = cellElem.closest('tr');
  const creation_date = tr.cells[1].querySelector('input').value;
  const due_date = tr.cells[2].querySelector('input').value;
  const title = tr.cells[3].innerText.trim();
  const type = tr.cells[4].querySelector('select').value;
  const content = tr.cells[5].innerText.trim();
  const idea = tr.cells[6].innerText.trim();
  const scripts = tr.cells[7].innerText.trim();
  const caption = tr.cells[8].innerText.trim();
  const assignWrap = tr.cells[9].querySelector('.ms-wrap');
  let assigned_to = "";
  if (assignWrap) {
    assigned_to = Array.from(assignWrap.querySelectorAll('.ms-chk:checked')).map(c => c.value).join(',');
  } else {
    const assignSelect = tr.cells[9].querySelector('select');
    assigned_to = assignSelect ? assignSelect.value : tr.cells[9].innerText.trim();
  }
  const status = tr.cells[10].querySelector('select').value;
  const link = tr.cells[11].innerText.trim();
  const myNotes = tr.cells[12].innerText.trim();
  
  const detailParts = [];
  if (content) detailParts.push(`Content: ${content}`);
  if (idea) detailParts.push(`Idea: ${idea}`);
  if (scripts) detailParts.push(`Scripts: ${scripts}`);
  if (caption) detailParts.push(`Caption: ${caption}`);
  if (link) detailParts.push(`Link: ${link}`);
  if (myNotes) detailParts.push(`Notes: ${myNotes}`);
  const notes = detailParts.join(" | ");
  
  let taskObj = null;
  let isNotionClient = false;
  for (const c of allData.clients || []) {
    taskObj = (c.tasks || []).find(t => String(t.id) === String(taskId));
    if (taskObj) {
      isNotionClient = notionMode && !!c.notion_id;
      break;
    }
  }
  if (!taskObj) return;
  
  const newTitle = `[${type}] ${title.replace(/^\[.*?\]\s*/, '')}`;
  
  const changedPayload = {};
    if (taskObj.description !== notes) changedPayload.submission_note = notes;
    if ((taskObj.creation_date || "") !== creation_date) changedPayload.creation_date = creation_date;
    if (taskObj.due_date !== due_date) changedPayload.due_date = due_date;
    if (taskObj.title !== newTitle) changedPayload.new_title = newTitle;
    if (taskObj.assigned_to !== assigned_to) changedPayload.assigned_to = assigned_to;
    if (taskObj.status !== status) changedPayload.status = status;

    if (Object.keys(changedPayload).length === 0) return;

    taskObj.description = notes;
    taskObj.creation_date = creation_date;
    taskObj.due_date = due_date;
    taskObj.title = newTitle;
    taskObj.assigned_to = assigned_to;
    taskObj.status = status;

    cellElem.style.opacity = "0.5";
    const statusEl = document.getElementById(`sheet-save-status-${clientId}`);
    if (statusEl) { clearTimeout(statusEl._t); statusEl.style.color = 'var(--muted)'; statusEl.textContent = 'Saving…'; }

    try {
      const endpoint = isNotionClient
        ? `${API}/api/notion/tasks/${taskId}`
        : `${API}/api/sqlite/tasks/${taskId}`;

      const res = await fetch(endpoint, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(changedPayload)
      });
    if (!res.ok) {
      let msg = "Row didn't save";
      try { const d = await res.json(); if (d.error) msg = d.error; } catch(_) {}
      throw new Error(msg);
    }

    // Dynamically update row background based on status without re-rendering the whole table
    const s = status.toLowerCase().replace(/ /g, '_');
    let rowBg = "transparent";
    if (s === "posted" || s === "done" || s === "approved") rowBg = "rgba(34, 211, 160, 0.18)";
    else if (s === "final") rowBg = "rgba(168, 85, 247, 0.18)";
    else if (s === "scheduled") rowBg = "rgba(92, 158, 255, 0.18)";
    else if (s === "in_progress") rowBg = "rgba(245, 166, 35, 0.18)";
    else if (s === "paused") rowBg = "rgba(255, 92, 92, 0.18)";
    else rowBg = "rgba(107, 107, 138, 0.12)";
    tr.style.backgroundColor = rowBg;

    if (statusEl) { statusEl.style.color = 'var(--grn)'; statusEl.textContent = 'Saved ✓'; statusEl._t = setTimeout(()=>{ statusEl.textContent=''; }, 1500); }

    if (clientId) {
      renderClientCalendar(clientId);
      if (typeof renderCalendar === 'function') renderCalendar();
      // intentionally NOT calling renderClientSheets(clientId) to prevent focus loss and scroll jumping
    }
  } catch(e) {
    toast(e.message || "Error saving row", "err");
    if (statusEl) { statusEl.style.color = 'var(--red)'; statusEl.textContent = 'Save failed ✕'; }
  } finally {
    cellElem.style.opacity = "1";
  }
}

function renderClientCalendar(clientId){
  const client = (allData.clients||[]).find(c=>String(c.id)===String(clientId));
  if(!client) return;
  const tasks = client.tasks||[];
  const d = _clientCalDate(clientId);
  const year = d.getFullYear(), month = d.getMonth();
  document.getElementById('ccal-label-'+clientId).textContent =
    d.toLocaleString('default',{month:'long'})+' '+year;
  const grid = document.getElementById('ccal-grid-'+clientId);
  while(grid.children.length > 7) grid.removeChild(grid.lastChild);
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  
  const byDate={};
  tasks.forEach(t=>{
    // Plot on Post Day (due_date)
    if(t.due_date){ (byDate[t.due_date]=byDate[t.due_date]||[]).push(t); }
  });

  // Blanks
  for(let i=0;i<firstDay;i++){
    const cell=document.createElement('div');
    cell.className='cal-cell other-month';
    cell.innerHTML=`<div class="cal-date">${daysInPrev-firstDay+1+i}</div>`;
    grid.appendChild(cell);
  }
  for(let day=1;day<=daysInMonth;day++){
    const cell=document.createElement('div');
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cellDate=new Date(year,month,day);
    cell.className='cal-cell'+(cellDate.getTime()===today.getTime()?' today':'');
    let html=`<div class="cal-date${cellDate.getTime()===today.getTime()?' today-num':''}">${day}</div>`;
    const dayTasks=byDate[dateStr]||[];
    dayTasks.slice(0,4).forEach(t=>{
      let typeStr = "Task";
      const m = t.title.match(/^\[(.*?)\]\s*(.*)$/);
      if (m) { typeStr = m[1]; }
      
      let bg = "rgba(245,166,35,.15)", textCol = "#f5a623", bdr = "rgba(245,166,35,.25)";
      if(typeStr.toLowerCase() === "story") { bg = "rgba(168,85,247,.15)"; textCol = "#a855f7"; bdr = "rgba(168,85,247,.25)"; }
      else if(typeStr.toLowerCase() === "reel") { bg = "rgba(59,130,246,.15)"; textCol = "#3b82f6"; bdr = "rgba(59,130,246,.25)"; }
      else if(typeStr.toLowerCase() === "carousel") { bg = "rgba(34,197,94,.15)"; textCol = "#22c55e"; bdr = "rgba(34,197,94,.25)"; }
      else if(typeStr.toLowerCase() === "post" || typeStr.toLowerCase() === "static") { bg = "rgba(244,63,94,.15)"; textCol = "#f43f5e"; bdr = "rgba(244,63,94,.25)"; }
      
      html+=`<span class="cal-pill" style="background:${bg};color:${textCol};border:1px solid ${bdr};text-align:center;" title="${t.title}">${typeStr}</span>`;
      
      if (t.feedback && t.feedback.status) {
         let fbColor = t.feedback.status === 'approved' ? '#22c55e' : (t.feedback.status === 'changes_requested' ? '#f43f5e' : '#f5a623');
         let fbBg = t.feedback.status === 'approved' ? 'rgba(34,197,94,.15)' : (t.feedback.status === 'changes_requested' ? 'rgba(244,63,94,.15)' : 'rgba(245,166,35,.15)');
         let fbText = t.feedback.status === 'approved' ? 'Approved' : (t.feedback.status === 'changes_requested' ? 'Changes Requested' : 'Commented');
         html+=`<span class="cal-pill" style="background:${fbBg};color:${fbColor};border:1px solid ${fbColor}40;text-align:center;margin-top:2px;font-size:0.6rem;" title="Feedback Status">${fbText}</span>`;
      }

    });
    if(dayTasks.length>4) html+=`<div class="cal-more">+${dayTasks.length-4} more</div>`;
    cell.innerHTML=html;
    if(dayTasks.length>0){
      cell.style.cursor='pointer';
      cell.addEventListener('mouseenter', e=>showCalPopup(e, dayTasks, clientId));
      cell.addEventListener('mouseleave', ()=>scheduleHidePopup());
    }
    grid.appendChild(cell);
  }
  // Fill trailing cells
  const total = firstDay+daysInMonth;
  const trailing=(7-total%7)%7;
  for(let i=1;i<=trailing;i++){
    const cell=document.createElement('div');
    cell.className='cal-cell other-month';
    cell.innerHTML=`<div class="cal-date">${i}</div>`;
    grid.appendChild(cell);
  }
}

// ── Calendar Popup ────────────────────────────────────────────────────────────
let _popupHideTimer=null;

function _getOrCreatePopup(){
  let p=document.getElementById('cal-popup');
  if(!p){
    p=document.createElement('div'); p.id='cal-popup';
    document.body.appendChild(p);
    p.addEventListener('mouseenter',()=>{ clearTimeout(_popupHideTimer); });
    p.addEventListener('mouseleave',()=>scheduleHidePopup());
  }
  return p;
}

function showCalPopup(e, dayTasks, clientId){
  clearTimeout(_popupHideTimer);
  const popup=_getOrCreatePopup();
  _renderPopupContent(popup, dayTasks, 0, clientId);
  positionPopup(popup, e.currentTarget);
  popup.style.display='block';
}

function _renderPopupContent(popup, dayTasks, idx, clientId){
  const t = dayTasks[idx];
  const assigneeName = (t.assigned_to||'').split(',').map(s=>EMP[s.trim()]||s.trim()||'—').join(', ') || '—';
  const statusLabel = {not_started:'Not Started',in_progress:'In Progress',pending_review:'⏳ Review',
    approved:' Approved',rejected:'↩ Changes',unlocked:'Unlocked'}[t.status]||t.status||'—';
  const taskId = t.notion_id || t.id;
  const cid = clientId || t.clientId;

  const notes = t.description || "";
  let extContent = t.content || "";
  let extIdea = t.idea || "";
  let extScripts = t.scripts || t.scripts_copy || "";
  if (!extContent) { const m = notes.match(/Content:\s*([\s\S]*?)(?=\s*\|\s*(?:Creation Date|Idea|Scripts|Caption|Link)\s*:|$)/); if(m) extContent = m[1].trim(); }
  if (!extIdea) { const m = notes.match(/Idea:\s*([\s\S]*?)(?=\s*\|\s*(?:Creation Date|Content|Scripts|Caption|Link)\s*:|$)/); if(m) extIdea = m[1].trim(); }
  if (!extScripts) { const m = notes.match(/Scripts:\s*([\s\S]*?)(?=\s*\|\s*(?:Creation Date|Content|Idea|Caption|Link)\s*:|$)/); if(m) extScripts = m[1].trim(); }

  let nav = dayTasks.length>1 ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-size:.72rem;color:var(--muted)">${idx+1} / ${dayTasks.length}</span>
    <div style="display:flex;gap:6px">
      ${idx>0?`<button onclick="event.stopPropagation();event.preventDefault();_renderPopupContent(document.getElementById('cal-popup'),window._popupTasks,${idx-1},${clientId?`'${clientId}'`:'null'})" style="background:var(--s2);border:1px solid var(--bdr);color:var(--muted);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.75rem">‹</button>`:'<span style="width:28px"></span>'}
      ${idx<dayTasks.length-1?`<button onclick="event.stopPropagation();event.preventDefault();_renderPopupContent(document.getElementById('cal-popup'),window._popupTasks,${idx+1},${clientId?`'${clientId}'`:'null'})" style="background:var(--s2);border:1px solid var(--bdr);color:var(--muted);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.75rem">›</button>`:'<span style="width:28px"></span>'}
    </div></div>` : '';
  window._popupTasks = dayTasks;
  popup.innerHTML = nav + `
    <div class="cp-title">${t.title}</div>
    <div class="cp-row"> Assignee: <span>${assigneeName}</span></div>
    <div class="cp-row"> Status: <span>${statusLabel}</span></div>
    <div class="cp-row"> Due: <span>${t.due_date||'—'}</span></div>
    ${esc(extContent)?`<div class="cp-row" style="display:block;margin-top:6px;font-size:.75rem;color:var(--txt)"><b>Content:</b> ${esc(extContent).replace(/(https?:\/\/[^\s<>"']+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()" style="color:var(--acc);text-decoration:underline">Link</a>')}</div>`:''}
    ${esc(extIdea)?`<div class="cp-row" style="display:block;margin-top:2px;font-size:.75rem;color:var(--txt)"><b>Idea:</b> ${esc(extIdea).replace(/(https?:\/\/[^\s<>"']+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()" style="color:var(--acc);text-decoration:underline">Link</a>')}</div>`:''}

function positionPopup(popup, anchor){
  popup.style.display='block';
  const rect=anchor.getBoundingClientRect();
  const pw=popup.offsetWidth||260, ph=popup.offsetHeight||200;
  let left=rect.right+8;
  let top=rect.top;
  if(left+pw>window.innerWidth-10) left=rect.left-pw-8;
  if(top+ph>window.innerHeight-10) top=window.innerHeight-ph-10;
  if(top<8) top=8;
  popup.style.left=left+'px';
  popup.style.top=top+'px';
}

function scheduleHidePopup(){
  _popupHideTimer=setTimeout(hideCalPopup,200);
}

function hideCalPopup(){
  const p=document.getElementById('cal-popup');
  if(p) p.style.display='none';
}

function openEditTask(clientId, taskId){
  const client=(allData.clients||[]).find(c=>String(c.id)===String(clientId));
  if(!client) return;
  const task=(client.tasks||[]).find(t=>(t.notion_id||String(t.id))===String(taskId)||(String(t.id)===String(taskId)));
  if(!task) return;

  // For social media clients, go directly to Sheets tab
  const isSocial = (client.tasks||[]).some(t => t.service === "Social Media" || /\[(Story|Static|Reel|Carousel|Post|Video)\]/i.test(t.title));
  
  if (isSocial) {
    // Make sure client card is open
    const body = document.getElementById(`dbody-${clientId}`);
    if (body && body.style.display === 'none') toggleDetail(clientId);
    // Switch to sheets tab
    const sheetsBtn = document.getElementById(`ctab-btn-${clientId}-sheets`);
    if (sheetsBtn) {
      switchClientTab(clientId, 'sheets', sheetsBtn);
      // Scroll to the specific row in the sheets section
      setTimeout(() => {
        const tr = document.querySelector(`tr[data-task-id="${task.id}"]`);
        if (tr) {
          tr.scrollIntoView({behavior: "smooth", block: "center"});
          const oldBg = tr.style.backgroundColor;
          tr.style.backgroundColor = "rgba(255, 255, 255, 0.4)";
          tr.style.outline = "2px solid var(--acc)";
          setTimeout(() => { 
              tr.style.backgroundColor = oldBg; 
              tr.style.outline = "none";
          }, 2500);
        } else {
          // Fallback to the sheets container if row not found
          const sheetsEl = document.getElementById(`ctab-${clientId}-sheets`);
          if (sheetsEl) sheetsEl.scrollIntoView({behavior:'smooth', block:'nearest'});
        }
      }, 150);
    }
  } else {
    // Non-social: switch to task list tab and highlight the task
    const listTabBtn=document.querySelector(`#dbody-${clientId} .ctab`);
    if(listTabBtn) switchClientTab(clientId,'list',listTabBtn);
    const el=document.getElementById('tc-'+taskId);
    if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.outline='2px solid var(--acc)'; setTimeout(()=>el.style.outline='',2000); }
  }
}

function switchClientTab(clientId, tabName, btn) {
  const body = document.getElementById("dbody-" + clientId);
  body.querySelectorAll('.ctab-content').forEach(el => el.style.display = 'none');
  body.querySelectorAll('.ctab').forEach(b => b.classList.remove('on'));
  document.getElementById(`ctab-${clientId}-${tabName}`).style.display = tabName === 'kanban' ? 'flex' : 'block';
  btn.classList.add('on');
  if(tabName === 'calendar') renderClientCalendar(clientId);
}

function renderTaskCard(t){
  const pct=t.progress||0;
  // Support multiple assignees (comma-separated emp-ids or names)
  const assigneeName = (t.assigned_to || "").split(',').map(s => EMP[s.trim()] || s.trim() || "—").join(', ');
  const taskId = t.notion_id || t.id;
  const statusLabel = {not_started:"Not Started","Not Started":"Not Started",unlocked:"Unlocked",in_progress:"In Progress","In Progress":"In Progress",pending_review:"⏳ Review","In Review":"⏳ Review",approved:" Approved","Done":" Done",rejected:"↩ Changes"}[t.status]||t.status;
  const statusKey = t.status?.toLowerCase().replace(/ /g,"_").replace(/-/g,"_") || "not_started";

  let dateBadgeHtml = "";
  if (t.due_date) {
    const d = new Date(t.due_date);
    if (!isNaN(d)) {
      const dayName = d.toLocaleDateString("en-US", { weekday: "short" });
      const dayNum = d.toLocaleDateString("en-US", { day: "2-digit" });
      const monthStr = d.toLocaleDateString("en-US", { month: "short" });
      const yearStr = d.getFullYear();
      dateBadgeHtml = `<span style="font-size:0.75rem; color:var(--muted); margin-left:8px; font-weight:500;">${dayName}, ${dayNum}-${monthStr}-${yearStr}</span>`;
    }
  }

  let subtasksHtml = "";
  if (t.subtasks && t.subtasks.length > 0) {
    subtasksHtml = `<div style="margin-top:10px; padding:8px; background:var(--bg); border:1px solid var(--bdr); border-radius:6px; font-size:0.8rem;">
      <div style="color:var(--muted); margin-bottom:4px; font-weight:600; font-size:0.75rem;">Subtasks:</div>
      ${t.subtasks.map(s => `
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px; color:${s.done ? 'var(--muted)' : 'var(--txt)'}; text-decoration:${s.done ? 'line-through' : 'none'};">
          <input type="checkbox" disabled ${s.done ? 'checked' : ''} style="margin:0; accent-color:var(--acc);">
          <span>${s.title}</span>
        </div>
      `).join('')}
    </div>`;
  }

  return`<div class="tc" id="tc-${taskId}">
    <div class="tc-top">
      <div><div class="tc-title">${t.title}</div>
        <div class="tc-who"> ${assigneeName}</div></div>
      <div style="display:flex; align-items:center;">
        <span class="sp sp-${statusKey}">${statusLabel}</span>
        ${dateBadgeHtml}
      </div>
    </div>
    <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
    ${t.submission_note?`<div class="sub-box"><div class="sub-label">Submission</div>${t.submission_note}</div>`:""}
    ${subtasksHtml}
    ${isInReview(t)&&!notionMode?`<div class="tc-actions">
      <button class="btn-sm btn-approve" onclick="approveTask(${t.id})"> Approve</button>
      <button class="btn-sm btn-reject" onclick="openModal(${t.id},null)">↩ Changes</button>
    </div>`:""}
    ${isInReview(t)&&notionMode?`<div class="tc-actions">
      <button class="btn-sm btn-approve" onclick="approveTaskNotion('${t.notion_id}')"> Approve</button>
      <button class="btn-sm btn-reject" onclick="openModal(null,'${t.notion_id}')">↩ Changes</button>
    </div>`:""}
    <div class="tc-actions" style="margin-top: 8px;">
      <button class="btn-sm" style="background:var(--s1);color:var(--txt);border:1px solid var(--bdr);" onclick="openEditTaskModal('${taskId}', '${(t.title||'').replace(/'/g, '&apos;')}', '${t.assigned_to||''}', '${t.due_date||''}')">✏ Edit Task</button>
      <button class="btn-sm" style="background:rgba(255,92,92,.1);color:var(--red);border:1px solid rgba(255,92,92,.2);" onclick="deleteTask('${taskId}')"> Delete</button>
    </div>
  </div>`;
}

// Task is in review if status matches any submitted variant
function isInReview(t){
  const s = (t.status||"").toLowerCase().replace(/[\s-]+/g,"_");
  return ["submitted","pending_review","in_review"].includes(s) || t.status==="In Review";
}

async function renderClientBlockers(clientId){
  const wrap = document.getElementById("cblockers-"+clientId);
  if(!wrap) return;
  const client = (allData.clients || []).find(c => String(c.id) === String(clientId));
  if(!client){ wrap.innerHTML = '<div class="empty">Client not found.</div>'; return; }
  
  if(notionMode){
    const today = new Date().toISOString().slice(0,10);
    const blockers = [];
    (client.tasks||[]).forEach(t=>{
      if(t.status!=="approved"&&t.due_date&&t.due_date<today){
        const assignees = (t.assigned_to || "").split(',').map(s => EMP[s.trim()] || s.trim() || "—").join(', ');
        blockers.push({client:client.name,task:t.title,assignee:assignees,days:Math.floor((new Date()-new Date(t.due_date))/86400000)});
      }
    });
    if(!blockers.length){wrap.innerHTML=`<div class="empty" style="padding:24px 0;"> No blockers right now.</div>`;return;}
    wrap.innerHTML=blockers.map(b=>`
      <div class="blocker-card">
        <div class="blocker-top">
          <div><div class="blocker-who"> ${b.assignee}</div>
            <div class="blocker-task">${b.task}</div></div>
          <span class="overdue-badge overdue-yes">${b.days}d overdue</span>
        </div>
        <div class="action-note"> Action needed: Follow up with ${b.assignee}</div>
      </div>`).join("");
    return;
  }
  
  // SQLite blockers
  const res=await fetch(`${API}/api/blockers?user_id=${UID}`);
  const data=await res.json();
  if(data.error){wrap.innerHTML=`<div class="empty">${data.error}</div>`;return;}
  
  // Filter for this client's tasks being blockers
  const clientBlockers = (data.blockers||[]).filter(b => String(b.blocker_task.client_id) === String(clientId));
  
  if(!clientBlockers.length){wrap.innerHTML=`<div class="empty" style="padding:24px 0;"> No blockers right now. Everything is flowing smoothly.</div>`;return;}
  const grouped={};
  for(const b of clientBlockers){
    const key=b.blocker_task.id;
    if(!grouped[key])grouped[key]={blocker:b.blocker_task,blocked:[],days:b.days_overdue};
    grouped[key].blocked.push(b.blocked_task);
  }
  wrap.innerHTML=Object.values(grouped).map(g=>{
    const badge=g.days>0?`<span class="overdue-badge overdue-yes">${g.days}d overdue</span>`:`<span class="overdue-badge overdue-no">Not yet due</span>`;
    return`<div class="blocker-card">
      <div class="blocker-top">
        <div><div class="blocker-who"> ${g.blocker.name}</div>
          <div class="blocker-task">${g.blocker.title}</div></div>
        ${badge}
      </div>
      <div class="blocker-chain">
        ${g.blocked.map(b=>`<div class="chain-item"><span class="arrow">└─▶</span> Blocking <strong>${b.name}</strong> — <span>${b.title}</span></div>`).join("")}
      </div>
      <div class="action-note"> Action needed: Follow up with ${g.blocker.name}</div>
    </div>`;
  }).join("");
}

function renderClientKanban(clientId){
  const board = document.getElementById("ckanban-"+clientId);
  if(!board) return;
  const client = (allData.clients || []).find(c => String(c.id) === String(clientId));
  if(!client) return;

  const tasks = (client.tasks || []).map(t => ({...t, clientName: client.name, clientUrl: client.url, notionId: t.notion_id || null}));
  if(!tasks.length){board.innerHTML='<div class="empty" style="padding:24px 0;">No tasks for this client yet.</div>';return;}

  const isSocial = clientIsSocial(client);
  const cols     = isSocial ? SOCIAL_STAGE_COLS : DEFAULT_STAGE_COLS;

  board.innerHTML = cols.map(col => {
    let colTasks = tasks.filter(t => col.statuses.includes(t.status) || col.statuses.includes((t.status||'').toLowerCase().replace(/ /g, '_')));
    colTasks.sort((a,b) => {
      if(!a.due_date) return 1;
      if(!b.due_date) return -1;
      return b.due_date.localeCompare(a.due_date);
    });
    return buildCol(col.key, col.emoji+" "+col.label, colTasks);
  }).join("");
  bindDragEvents(board, isSocial);
}

function bindDragEvents(board, isSocial){
  const activeStatusMap = isSocial ? SOCIAL_STATUS_MAP : DEFAULT_STATUS_MAP;
  board.querySelectorAll(".kcard").forEach(card=>{
    card.addEventListener("dragstart", e=>{
      draggedCard={taskId:card.dataset.taskId,notionId:card.dataset.notionId,taskTitle:card.dataset.taskTitle,assignee:card.dataset.assignee,clientName:card.dataset.clientName,isQuick:card.dataset.isQuick==="true"};
      card.classList.add("dragging");e.dataTransfer.effectAllowed="move";
    });
    card.addEventListener("dragend",()=>card.classList.remove("dragging"));
  });
  board.querySelectorAll(".kanban-col").forEach(col=>{
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("drag-over");});
    col.addEventListener("dragleave",()=>col.classList.remove("drag-over"));
    col.addEventListener("drop",async e=>{
      e.preventDefault();col.classList.remove("drag-over");
      if(!draggedCard)return;
      // For social media boards the col key IS the status; for default boards use the map
      const colKey = col.dataset.col;
      const newStatus = activeStatusMap[colKey] || colKey;
      if(!newStatus)return;
      // Use the unified backend update logic for both quick and normal tasks
      await updateTaskStatus(draggedCard.taskId, draggedCard.notionId, newStatus, draggedCard.taskTitle, draggedCard.assignee, draggedCard.clientName);
    });
  });
}

function buildCol(key, label, tasks){
  const today = new Date().toISOString().slice(0,10);
  return `<div class="kanban-col" data-col="${key}" ondragover="event.preventDefault()">
    <div class="kcol-head">
      <span class="kcol-title">${label}</span>
      <span class="kcol-count">${tasks.length}</span>
    </div>
    <div class="kcol-body">
      ${tasks.length ? tasks.map(t => buildCard(t, today)).join("") : '<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:16px">Drop here</div>'}
    </div>
  </div>`;
}

function buildCard(t, today){
  // Parse multiple assignees (comma-separated names or emp-ids)
  const rawAssignees = (t.assigned_to || "").split(',').map(s => s.trim()).filter(Boolean);
  const assignees = rawAssignees.length ? rawAssignees.map(a => EMP[a] || a) : ["?"];
  const allNames = assignees.join(', ');

  const isOverdue = t.due_date && t.due_date < today && t.status !== "approved";
  const dueLabel = t.due_date ? (isOverdue ? " "+t.due_date : " "+t.due_date) : "";
  const pct = t.progress || 0;
  const taskId = t.id || t.notion_id || "";
  const notionId = t.notionId || t.notion_id || "";
  const notionHref = (notionMode && t.clientUrl) ? `<a href="${t.clientUrl}" target="_blank" style="font-size:.65rem;color:var(--acc);text-decoration:none;float:right" title="Open in Notion">↗</a>` : "";

  // Build one avatar per assignee (stack them with negative margin)
  const avatarHtml = assignees.map((name, i) => {
    const initial = name.charAt(0).toUpperCase();
    const color = AVATAR_COLORS[name] || "#888";
    return `<div class="kavatar" style="background:${color};z-index:${10-i}" title="${name}"
      onclick="event.stopPropagation();openAssigneePicker(this)"
    >${initial}</div>`;
  }).join('');

  return `<div class="kcard" draggable="true"
    data-task-id="${taskId}"
    data-notion-id="${notionId}"
    data-is-quick="${t.isQuick ? 'true' : 'false'}"
    data-task-title="${(t.title||'').replace(/"/g,'&quot;')}"
    data-assignee="${allNames.replace(/"/g,'&quot;')}"
    data-due-date="${t.due_date||''}"
    data-client-name="${(t.clientName||'').replace(/"/g,'&quot;')}">
    <div class="kcard-client">${t.clientName || ""} ${notionHref}</div>
    <div class="kcard-title">${t.title}</div>
    <div class="kbar"><div class="kbar-fill" style="width:${pct}%"></div></div>
    <div class="kcard-footer">
      <span class="kcard-due${isOverdue?' overdue':''}">${dueLabel}</span>
      <div class="kcard-avatars">${avatarHtml}</div>
    </div>
  </div>`;
}

async function updateTaskStatus(taskId, notionId, newStatus, taskTitle='', assignee='', clientName=''){
  // Optimistic UI update: instantly update local memory
  let foundClient = null;
  for(const c of allData.clients || []){
    let t = (c.tasks||[]).find(x => String(x.id) === String(taskId) || String(x.notion_id) === String(notionId));
    if(t) {
      t.status = newStatus;
      foundClient = c.id;
      break;
    }
  }
  
  if (foundClient) {
    renderClientKanban(foundClient);
    renderClientCalendar(foundClient);
    // Don't re-render sheets if we are just dropping in kanban, but doing it ensures consistency.
    // However, sheets shouldn't be active if we are in kanban view.
  }

  let qt = quickTasks.find(x => String(x.id) === String(taskId) || String(x.notion_id) === String(notionId));
  if(qt){
    qt.status = newStatus;
    const filterBtn = document.querySelector(".client-filter-btn[onclick*='__quick__']");
    if(filterBtn && selectedClient === "__quick__") filterByClient("__quick__", filterBtn);
  }

  // Background network update
  if(notionMode && notionId){
    fetch(`${API}/api/notion/tasks/${notionId}`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        status:      newStatus,
        task_title:  taskTitle,
        assignee:    assignee,
        client_name: clientName,
      })
    }).then(r => r.json()).then(d => {
      if(d.success) toast("Status updated!");
      else toast(d.error||"Update failed","err");
    }).catch(e => toast("Error: "+e.message,"err"));
  } else if(taskId){
    fetch(`${API}/api/sqlite/tasks/${taskId}`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({status:newStatus})
    }).then(r => r.json()).then(d => {
      if(d.success) toast("Status updated!");
      else toast(d.error||"Update failed","err");
    }).catch(e => toast("Error: "+e.message,"err"));
  }
}
</script>

    'branding': ['stylescape', 'logo', 'brand essence', 'collateral'],

// Generate consistent colors from strings
function getColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  const h = hash % 360;
  return `hsl(${h}, 70%, 40%)`;
}

function renderCalendar(){
  if(!allData) return;
  
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  document.getElementById("cal-month-label").textContent = `${monthNames[month]} ${year}`;
  
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  
  // Collect tasks with due dates
  const taskMap = {};
  (allData.clients || []).forEach(c => {
    (c.tasks || []).forEach(t => {
      if(t.due_date && t.status !== "approved") {
        if(!taskMap[t.due_date]) taskMap[t.due_date] = [];
        taskMap[t.due_date].push({...t, clientName: c.name, clientId: c.id});
      }
    });
  });

  const grid = document.getElementById("cal-grid");
  while(grid.firstChild) grid.removeChild(grid.firstChild);
  
  // Headers
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  days.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name';
    el.textContent = d;
    grid.appendChild(el);
  });
  
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  
  // Empty cells for offset
  for(let i=0; i<firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    grid.appendChild(cell);
  }
  
  for(let d=1; d<=daysInMonth; d++) {
    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = (dStr === todayStr);
    
    const cell = document.createElement('div');
    cell.className = `cal-cell ${isToday?'today':''}`;
    
    let html = `<div class="cal-date ${isToday?'today-num':''}">${d}</div>`;
    
    const dayTasks = taskMap[dStr] || [];
    const visible = dayTasks.slice(0, 3);
    
    visible.forEach(t => {
      const bg = getColor(t.clientName);
      html += `<span class="cal-pill" style="background:${bg};color:#fff" title="${t.title} (${t.clientName})">${t.clientName}: ${t.title}</span>`;
      
      if (t.feedback && t.feedback.status) {
         let fbColor = t.feedback.status === 'approved' ? '#22c55e' : (t.feedback.status === 'changes_requested' ? '#f43f5e' : '#f5a623');
         let fbBg = t.feedback.status === 'approved' ? 'rgba(34,197,94,.15)' : (t.feedback.status === 'changes_requested' ? 'rgba(244,63,94,.15)' : 'rgba(245,166,35,.15)');
         let fbText = t.feedback.status === 'approved' ? 'Approved' : (t.feedback.status === 'changes_requested' ? 'Changes Requested' : 'Commented');
         html+=`<span class="cal-pill" style="background:${fbBg};color:${fbColor};border:1px solid ${fbColor}40;text-align:center;margin-top:2px;font-size:0.6rem;" title="Feedback Status">${fbText}</span>`;
      }
    });
    
    if(dayTasks.length > 3) {
      html += `<span class="cal-more">+${dayTasks.length - 3} more</span>`;
    }
    
    cell.innerHTML = html;
    
    if(dayTasks.length > 0) {
      cell.style.cursor = 'pointer';
      // In the global calendar, we pass null for clientId because tasks might belong to different clients.
      // But openEditTask needs clientId. We stored clientName in `t`, so we need to inject clientId as well.
      cell.addEventListener('mouseenter', e => showCalPopup(e, dayTasks, null));
      cell.addEventListener('mouseleave', () => scheduleHidePopup());
    }
    
    grid.appendChild(cell);
  }
}

async function importClientSocialCSV(event, clientId) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(e) {
    let parsedRows = [];
    
    const isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');
    
    if (isExcel) {
      // Parse Excel with SheetJS
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array', cellDates: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const jsonRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
      if (jsonRows.length < 2) return;
      let headerIdx = 0;
      for (let i = 0; i < Math.min(5, jsonRows.length); i++) {
        const row = jsonRows[i].map(c => String(c).toLowerCase());
        if (row.some(c => c.includes('post') || c.includes('caption') || c.includes('type'))) {
          headerIdx = i;
          break;
        }
      }
      const headers = jsonRows[headerIdx].map(h => String(h).toLowerCase().trim());
      const colIdx = {
        creationDate: headers.findIndex(h => h.includes('creation') || h === 'date'),
        postDay:      headers.findIndex(h => h.includes('post day') || h.includes('day')),
        post:         headers.findIndex(h => h === 'post' || h.includes('post title') || h.includes('title')),
        type:         headers.findIndex(h => h === 'type'),
        content:      headers.findIndex(h => h === 'content'),
        idea:         headers.findIndex(h => h === 'idea'),
        scripts:      headers.findIndex(h => h.includes('script') || h.includes('copy')),
        caption:      headers.findIndex(h => h === 'caption'),
        assignee:     headers.findIndex(h => h.includes('assign')),
        status:       headers.findIndex(h => h === 'status'),
        link:         headers.findIndex(h => h.includes('link') || h.includes('drive') || h === 'file'),
      };
      const getCell = (row, key) => {
        const idx = colIdx[key];
        if (idx < 0 || idx >= row.length) return "";
        const val = row[idx];
        if (val instanceof Date) return val.toISOString().split('T')[0];
        return String(val || "").trim();
      };
      parsedRows = jsonRows.slice(headerIdx + 1).filter(r => r.some(c => c !== "")).map(row => ({
        creationDate: getCell(row, 'creationDate'),
        postDay:      getCell(row, 'postDay'),
        post:         getCell(row, 'post'),
        type:         getCell(row, 'type') || "Story",
        content:      getCell(row, 'content'),
        idea:         getCell(row, 'idea'),
        scripts:      getCell(row, 'scripts'),
        caption:      getCell(row, 'caption'),
        assignee:     getCell(row, 'assignee'),
        status:       getCell(row, 'status') || "Scheduled",
        link:         getCell(row, 'link'),
      }));
    } else {
      // Parse CSV
      const text = e.target.result;
      const rows = text.split("\n").map(r => r.trim()).filter(Boolean);
      if (rows.length < 2) return;
      parsedRows = rows.slice(1).map(row => {
        const regex = /(?:\"([^\"]*(?:\"\"[^\"]*)*)\"|([^,]+)|)(?:,|$)/g;
        let m; let data = [];
        while ((m = regex.exec(row)) !== null && m[0] !== "") {
          let val = m[1] !== undefined ? m[1].replace(/\"\"/g, "\"") : (m[2] || "");
          data.push(val);
        }
        return {
          creationDate: data[0] || "",
          postDay:      data[1] || "",
          post:         data[2] || "",
          type:         data[3] || "Story",
          content:      data[4] || "",
          idea:         data[5] || "",
          scripts:      data[6] || "",
          caption:      data[7] || "",
          assignee:     data[8] || "",
          status:       data[9] || "Scheduled",
          link:         data[10] || ""
        };
      });
    }

    const btn = event.target.parentElement;
    const oldText = btn.innerHTML;
    btn.innerHTML = "⏳ Auto-filling with Claude...";

    try {
      const ar = await fetch(`${API}/api/social-media/auto-fill`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ posts: parsedRows }),
      });
      const data = await ar.json();
      if (data.error) {
        toast("Claude Error: " + data.error, "err");
      } else if (data.posts) {
        // Find client
        const client = (allData.clients||[]).find(c=>String(c.id)===String(clientId));
        if (client) {
          const res = await fetch(`${API}/api/clients/${clientId}/auto-tasks`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              user_id: UID,
              client_name: client.name,
              services: ["social"],
              social_posts: data.posts.map(p => ({
                title: p.post,
                type: p.type,
                content: p.content,
                idea: p.idea,
                scripts: p.scripts,
                caption: p.caption,
                link: p.link,
                assignee: p.assignee,
                post_day: p.postDay,
                creation_date: p.creationDate,
                status: p.status
              }))
            })
          });
          if (res.ok) {
            toast("Successfully imported tasks.");
            load(); // reload dashboard
          }
        }
      }
    } catch (err) {
      toast("Error Auto-filling with Claude.", "err");
      console.error(err);
    } finally {
      btn.innerHTML = oldText;
      event.target.value = "";
    }
  };
  if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }
}
</script>

  </a>
</div>

<script>
const linkPopup = document.getElementById('link-hover-popup');
const linkA = document.getElementById('link-hover-a');
const linkText = document.getElementById('link-hover-text');
let popupTimeout;

document.addEventListener('mouseover', e => {
  const cell = e.target.closest('td[contenteditable="true"]');
  if (cell) {
    const text = cell.innerText.trim();
    const urlMatch = text.match(/(https?:\/\/[^\s]+)/i);
    
    // Only show if the cell contains a valid URL
    if (urlMatch) {
      const url = urlMatch[1];
      linkA.href = url;
      linkText.textContent = url.length > 40 ? url.substring(0, 40) + '...' : url;
      
      const rect = cell.getBoundingClientRect();
      linkPopup.style.display = 'block';
      linkPopup.style.top = (rect.bottom + window.scrollY - 2) + 'px';
      
      // Keep it within screen bounds horizontally
      let leftPos = rect.left + window.scrollX;
      if (leftPos + 300 > window.innerWidth) leftPos = window.innerWidth - 320;
      linkPopup.style.left = leftPos + 'px';
      
      clearTimeout(popupTimeout);
    } else {
      hidePopup();
    }
  } else if (!e.target.closest('#link-hover-popup')) {
    hidePopup();
  }
});

function hidePopup() {
  clearTimeout(popupTimeout);
  popupTimeout = setTimeout(() => {
    linkPopup.style.display = 'none';
  }, 200);
}

linkPopup.addEventListener('mouseover', () => clearTimeout(popupTimeout));
linkPopup.addEventListener('mouseleave', hidePopup);

// Also hide on scroll to prevent popup floating randomly
window.addEventListener('scroll', hidePopup, true);

// Force plain text paste in contenteditable cells to prevent Excel/Word formatting issues
document.addEventListener('paste', function(e) {
  const target = e.target;
  // Use closest just in case the paste targets a child node of the contenteditable element
  if (target && target.closest('[contenteditable="true"]')) {
    e.preventDefault();
    const text = (e.originalEvent || e).clipboardData.getData('text/plain');
    document.execCommand('insertText', false, text);
  }
});
</script>
