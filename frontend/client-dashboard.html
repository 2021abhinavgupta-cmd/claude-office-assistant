<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Portal — Agency Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --s1: #151518;
      --s2: #1e1e22;
      --txt: #f3f3f3;
      --muted: #8b8b93;
      --bdr: #2c2c30;
      --acc: #f5a623;
      --acc-hover: #ffb842;
      --red: #ff4b4b;
      --green: #20c997;
      --blue: #339af0;
      --r: 20px;
      --rs: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--txt); display:flex; flex-direction:column; min-height:100vh; overflow-x:hidden; }
    
    /* Header */
    header { display:flex; align-items:center; justify-content:space-between; padding:20px 40px; background:var(--s1); border-bottom:1px solid var(--bdr); position:sticky; top:0; z-index:100; }
    .logo { display:flex; align-items:center; gap:12px; }
    .logo-icon { width:36px; height:36px; background:var(--acc); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
    .logo-text { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; letter-spacing:-0.02em; }
    .header-right { display:flex; align-items:center; gap:20px; }
    .client-greeting { font-weight:600; font-size:.95rem; color:var(--muted); }
    .client-greeting span { color:var(--acc); }
    .btn-logout { background:transparent; border:1px solid var(--bdr); color:var(--txt); padding:8px 16px; border-radius:var(--rs); cursor:pointer; font-weight:600; font-size:.85rem; transition:all .2s; }
    .btn-logout:hover { border-color:var(--red); color:var(--red); background:rgba(255,75,75,.1); }

    /* Main Layout */
    .container { flex:1; padding:40px; max-width:1400px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:30px; }

    /* Title & Toggle */
    .page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:10px; }
    .page-title h1 { font-family:'Syne',sans-serif; font-size:2.2rem; font-weight:800; margin-bottom:8px; }
    .page-title p { color:var(--muted); font-size:1.05rem; }

    .view-toggle { display:flex; background:var(--s1); border:1px solid var(--bdr); border-radius:var(--rs); padding:6px; }
    .view-btn { padding:10px 20px; border-radius:8px; border:none; background:transparent; color:var(--muted); font-weight:600; font-size:.9rem; cursor:pointer; transition:all .2s; }
    .view-btn:hover { color:var(--txt); }
    .view-btn.active { background:var(--s2); color:var(--acc); box-shadow:0 4px 12px rgba(0,0,0,.2); }

    /* Views */
    .view-container { display:none; flex:1; }
    .view-container.active { display:block; animation:fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* Empty State / Loading */
    .state-msg { text-align:center; padding:60px 20px; color:var(--muted); font-size:1.1rem; background:var(--s1); border-radius:var(--r); border:1px dashed var(--bdr); }

    /* KANBAN VIEW */
    .kanban-board { display:flex; gap:20px; align-items:flex-start; overflow-x:auto; padding-bottom:20px; }
    .kanban-col { flex:1; min-width:300px; background:var(--s1); border:1px solid var(--bdr); border-radius:var(--r); display:flex; flex-direction:column; max-height:calc(100vh - 250px); }
    .col-header { padding:16px 20px; border-bottom:1px solid var(--bdr); font-weight:700; font-family:'Syne',sans-serif; font-size:1.1rem; display:flex; align-items:center; justify-content:space-between; }
    .col-count { background:var(--s2); padding:2px 8px; border-radius:10px; font-size:.8rem; color:var(--muted); }
    .col-body { padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }

    .task-card { background:var(--bg); border:1px solid var(--bdr); border-radius:var(--rs); padding:16px; transition:all .2s; cursor:pointer; }
    .task-card:hover { border-color:var(--acc); transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.3); }
    .task-title { font-weight:700; font-size:1.05rem; margin-bottom:8px; line-height:1.3; }
    .task-desc { font-size:.85rem; color:var(--muted); margin-bottom:14px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .task-meta { display:flex; align-items:center; justify-content:space-between; font-size:.8rem; color:var(--muted); }
    .task-date { display:flex; align-items:center; gap:6px; }
    .task-date.overdue { color:var(--red); font-weight:600; }
    
    .progress-bar { width:100%; height:6px; background:var(--s2); border-radius:3px; margin-bottom:10px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--acc); border-radius:3px; transition:width .3s; }

    /* CALENDAR VIEW */
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .cal-nav-btn { background:var(--s1); border:1px solid var(--bdr); color:var(--txt); width:36px; height:36px; border-radius:10px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
    .cal-nav-btn:hover { border-color:var(--acc); color:var(--acc); }
    .cal-nav-label { font-size:1.2rem; font-weight:700; text-align:center; }
    .calendar-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:1px; background:var(--bdr); border:1px solid var(--bdr); border-radius:var(--r); overflow:hidden; }
    .cal-header-day { background:var(--s1); padding:12px; text-align:center; font-weight:700; font-size:.85rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
    .cal-day { background:var(--bg); height:115px; overflow:hidden; padding:10px; display:flex; flex-direction:column; transition:background .2s; }
    .cal-day:hover { background:var(--s1); }
    .cal-day.empty { background:var(--s2); opacity:0.5; }
    .cal-date-num { font-size:1rem; font-weight:600; color:var(--muted); margin-bottom:8px; display:block; width:100%; }
    .cal-day.today .cal-date-num { color:var(--acc); background:rgba(245,166,35,.15); width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .cal-task { background:var(--s2); border-left:3px solid var(--acc); padding:6px 8px; border-radius:4px; font-size:.8rem; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; transition:background .2s; }
    .cal-task:hover { background:rgba(245,166,35,.15); }
    .cal-task.done { border-left-color:var(--green); text-decoration:line-through; opacity:0.6; }

    /* SOCIAL MEDIA KANBAN */
    .kanban-board { display:flex; gap:16px; align-items:flex-start; overflow-x:auto; padding-bottom:20px; }
    .kanban-col { flex:0 0 260px; background:var(--s1); border:1px solid var(--bdr); border-radius:var(--r); display:flex; flex-direction:column; max-height:calc(100vh - 280px); }

    /* CALENDAR TASK HOVER TOOLTIP */
    .cal-task { position:relative; }
    .cal-task .cal-tip {
      display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
      background:#1e1e26; border:1px solid var(--bdr); border-radius:8px; padding:8px 12px;
      font-size:.78rem; color:var(--txt); white-space:nowrap; z-index:999;
      box-shadow:0 8px 24px rgba(0,0,0,.5); pointer-events:none; min-width:160px;
    }
    .cal-task .cal-tip::after {
      content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
      border:5px solid transparent; border-top-color:#1e1e26;
    }
    .cal-task:hover .cal-tip { display:block; }

    /* TIMELINE VIEW */
    .timeline-container { background:var(--s1); border:1px solid var(--bdr); border-radius:var(--r); padding:30px; }
    .tl-header { display:flex; border-bottom:1px solid var(--bdr); padding-bottom:10px; margin-bottom:20px; font-weight:700; color:var(--muted); font-size:.85rem; text-transform:uppercase; }
    .tl-col-task { width:40%; }
    .tl-col-chart { width:60%; display:flex; justify-content:space-between; position:relative; }
    .tl-month-marker { flex:1; text-align:center; border-left:1px dashed var(--bdr); padding-left:10px; }
    
    .tl-row { display:flex; margin-bottom:16px; align-items:center; }
    .tl-info { width:40%; padding-right:20px; }
    .tl-title { font-weight:600; font-size:.95rem; margin-bottom:4px; }
    .tl-dates { font-size:.75rem; color:var(--muted); }
    
    .tl-track { width:60%; height:32px; background:var(--s2); border-radius:16px; position:relative; overflow:hidden; border:1px solid var(--bdr); }
    .tl-bar { position:absolute; height:100%; background:var(--acc); opacity:0.8; border-radius:16px; display:flex; align-items:center; padding:0 12px; font-size:.75rem; font-weight:700; color:#000; box-shadow:0 2px 8px rgba(245,166,35,.3); }
    .tl-bar.done { background:var(--green); box-shadow:none; opacity:0.6; }

    /* MODAL */
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); z-index:9999; display:none; align-items:center; justify-content:center; }
    .modal-overlay.active { display:flex; animation:fadeIn .2s ease; }
    .modal-content { background:var(--s1); width:90%; max-width:500px; max-height:90vh; overflow-y:auto; border-radius:var(--r); border:1px solid var(--bdr); padding:30px; box-shadow:0 12px 40px rgba(0,0,0,.5); }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .modal-header h2 { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:700; margin:0; }
    .btn-close { background:transparent; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; transition:color .2s; }
    .btn-close:hover { color:var(--red); }
    .modal-body { display:flex; flex-direction:column; gap:16px; }
    .modal-task-detail { background:var(--s2); padding:16px; border-radius:12px; font-size:.9rem; color:var(--muted); }
    .modal-task-detail strong { color:var(--txt); }
    .feedback-textarea { width:100%; min-height:100px; background:var(--bg); border:1px solid var(--bdr); border-radius:12px; padding:16px; color:var(--txt); font-family:'DM Sans',sans-serif; resize:vertical; font-size:.95rem; }
    .feedback-textarea:focus { outline:none; border-color:var(--acc); }
    .modal-actions { display:flex; gap:12px; margin-top:10px; }
    .btn-action { flex:1; padding:12px; border-radius:12px; border:none; font-weight:700; font-size:1rem; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-approve { background:rgba(32,201,151,.1); color:var(--green); border:1px solid rgba(32,201,151,.3); }
    .btn-approve:hover { background:var(--green); color:#000; }
    .btn-reject { background:rgba(255,75,75,.1); color:var(--red); border:1px solid rgba(255,75,75,.3); }
    .btn-reject:hover { background:var(--red); color:#fff; }
    
    .feedback-banner { margin-top: 10px; padding: 12px; border-radius: 8px; font-size: .85rem; font-weight: 600; display: none; }
    .feedback-banner.approved { background: rgba(32,201,151,.15); color: var(--green); border: 1px solid rgba(32,201,151,.3); }
    .feedback-banner.rejected { background: rgba(255,75,75,.15); color: var(--red); border: 1px solid rgba(255,75,75,.3); }

  </style>
  <script src="shared-config.js"></script>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">AP</div>
      <div class="logo-text">Client Portal</div>
    </div>
    <div class="header-right">
      <div class="client-greeting" id="client-greeting">Loading...</div>
      <button class="btn-logout" onclick="clientLogout()">Log Out</button>
    </div>
  </header>

  <div class="container">
    
    <div class="page-header">
      <div class="page-title">
        <h1>Project Dashboard</h1>
        <p>Track the progress of your tasks in real-time.</p>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" onclick="switchView('kanban')" id="btn-kanban">Kanban</button>
        <button class="view-btn" onclick="switchView('calendar')" id="btn-calendar">Calendar</button>
        <button class="view-btn" onclick="switchView('timeline')" id="btn-timeline">Timeline</button>
      </div>
    </div>

    <div id="state-msg" class="state-msg">Loading tasks...</div>

    <!-- KANBAN -->
    <div id="view-kanban" class="view-container active">
      <!-- Kanban columns rendered by JS based on task service type -->
      <div class="kanban-board" id="kanban-board"></div>
    </div>

    <!-- CALENDAR -->
    <div id="view-calendar" class="view-container">
      <!-- Calendar nav + grid rendered by JS -->
      <div id="cal-root"></div>
    </div>

    <!-- TIMELINE -->
    <div id="view-timeline" class="view-container">
      <div class="timeline-container" id="tl-root"></div>
    </div>

  </div>

  <script src="client-auth.js"></script>
  <script>
    let allTasks = [];
    let clientInfo = null;
    let calDate = new Date(); // Current calendar month

    window.onClientAuthenticated = (client) => {
      clientInfo = client;
      document.getElementById("client-greeting").innerHTML = `Welcome back, <span>${client.client_name}</span>`;
      fetchTasks();
    };

    async function fetchTasks() {
      try {
        const res = await fetch(`${API}/api/client-portal/tasks`);
        const data = await res.json();
        if(data.tasks) {
          allTasks = data.tasks;
          document.getElementById("state-msg").style.display = allTasks.length ? "none" : "block";
          if(!allTasks.length) document.getElementById("state-msg").textContent = "No tasks found for your project yet.";
          renderViews();
        }
      } catch(e) {
        console.error(e);
        document.getElementById("state-msg").textContent = "Failed to load tasks.";
      }
    }

    function switchView(view) {
      document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
      document.getElementById(`btn-${view}`).classList.add("active");
      document.querySelectorAll(".view-container").forEach(v => v.classList.remove("active"));
      document.getElementById(`view-${view}`).classList.add("active");
    }

    function renderViews() {
      const isSocial = isSocialMediaClient();
      
      if (isSocial) {
        document.getElementById('btn-kanban').style.display = 'none';
        document.getElementById('btn-timeline').style.display = 'none';
        // Force calendar view if it's social media
        switchView('calendar');
        renderCalendar();
      } else {
        document.getElementById('btn-kanban').style.display = 'inline-block';
        document.getElementById('btn-timeline').style.display = 'inline-block';
        renderKanban();
        renderCalendar();
        renderTimeline();
      }
    }

    // ── Detect if this client uses Social Media ───────────────────────────────
    function isSocialMediaClient() {
      return allTasks.some(t => {
        const svc   = (t.service || "").toLowerCase();
        const title = (t.title   || "").toLowerCase();
        // Detect by service field
        if(svc.includes("social")) return true;
        // Detect by title containing "social"
        if(title.includes("social")) return true;
        // Detect by bracket-style post types: [Story], [Reel], [Static], [Carousel], [Post]
        if(/^\[(story|reel|static|carousel|post|ig|instagram|fb|facebook|tiktok|youtube)\]/i.test(t.title || "")) return true;
        return false;
      });
    }

    // ── KANBAN LOGIC ─────────────────────────────────────────────────────────
    const DEFAULT_COLS = [
      { key:"not_started",   label:"To Do",       color:"var(--muted)",  emoji:"" },
      { key:"in_progress",   label:"In Progress", color:"var(--blue)",   emoji:"" },
      { key:"pending_review",label:"In Review",   color:"var(--acc)",    emoji:"⏳" },
      { key:"approved",      label:"Approved",    color:"var(--green)",  emoji:"" },
    ];
    const SOCIAL_COLS = [
      { key:"need_to_start", label:"Need to Start", color:"var(--muted)",  emoji:"" },
      { key:"scheduled",     label:"Scheduled",     color:"var(--blue)",   emoji:"" },
      { key:"in_progress",   label:"In Progress",   color:"#B38B59",       emoji:"" },
      { key:"paused",        label:"Paused",         color:"#f59e0b",       emoji:"⏸" },
      { key:"posted",        label:"Posted",         color:"var(--green)",  emoji:"" },
      { key:"final",         label:"Final",          color:"#22d3ee",       emoji:"" },
    ];

    // Normalise a raw status string to a canonical key
    function normaliseStatus(status, isSocial) {
      const s = (status || "").toLowerCase().replace(/[^a-z_]/g, "").replace(/ /g, "_");
      // Social mappings
      if(isSocial) {
        if(["need_to_start","not_started","unlocked"].includes(s)) return "need_to_start";
        if(["scheduled"].includes(s)) return "scheduled";
        if(["in_progress","inprogress"].includes(s)) return "in_progress";
        if(["paused"].includes(s)) return "paused";
        if(["posted","done","approved","final_posted"].includes(s)) return "posted";
        if(["final"].includes(s)) return "final";
        return "need_to_start";
      }
      // Default mappings
      if(["not_started","todo","unlocked","need_to_start"].includes(s)) return "not_started";
      if(["in_progress","inprogress"].includes(s)) return "in_progress";
      if(["in_review","pending_review","submitted"].includes(s)) return "pending_review";
      if(["approved","done","final","posted"].includes(s)) return "approved";
      return "not_started";
    }

    function renderKanban() {
      const board = document.getElementById("kanban-board");
      const isSocial = isSocialMediaClient();
      const cols = isSocial ? SOCIAL_COLS : DEFAULT_COLS;

      // Build a bucket for each column
      const buckets = {};
      cols.forEach(c => buckets[c.key] = []);

      allTasks.forEach(t => {
        const key = normaliseStatus(t.status, isSocial);
        if(buckets[key]) buckets[key].push(t);
        else buckets[cols[0].key].push(t); // fallback to first col
      });

      board.innerHTML = cols.map(col => {
        const tasks = buckets[col.key];
        const today = new Date().toISOString().slice(0,10);
        return `
          <div class="kanban-col">
            <div class="col-header" style="border-bottom:2px solid ${col.color}">
              ${col.emoji} ${col.label}
              <span class="col-count">${tasks.length}</span>
            </div>
            <div class="col-body">
              ${tasks.length ? tasks.map(t => `
                <div class="task-card" onclick="openTaskFeedback('${t.id}')">
                  <div class="progress-bar"><div class="progress-fill" style="width:${t.progress||0}%"></div></div>
                  <div class="task-title">${t.title}</div>
                  <div class="task-desc">${t.description || ""}</div>
                  <div class="task-meta">
                    <div class="task-date ${t.due_date && t.due_date < today ? 'overdue' : ''}">
                       ${t.due_date || "No due date"}
                    </div>
                    <div>${t.assigned_to ? ' ' + t.assigned_to : ''}</div>
                  </div>
                </div>`).join("") : '<div style="padding:20px;color:var(--muted);font-size:.85rem;text-align:center">No tasks</div>'}
            </div>
          </div>`;
      }).join("");
    }

    function isOverdue(dateStr) {
      if(!dateStr) return false;
      return new Date(dateStr) < new Date(new Date().setHours(0,0,0,0));
    }

    // ── CALENDAR LOGIC ────────────────────────────────────────────────────────
    function calPrev() { calDate.setMonth(calDate.getMonth() - 1); renderCalendar(); }
    function calNext() { calDate.setMonth(calDate.getMonth() + 1); renderCalendar(); }

    function renderCalendar() {
      const root = document.getElementById("cal-root");
      const year  = calDate.getFullYear();
      const month = calDate.getMonth();
      const now   = new Date();
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

      const firstDay    = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();

      let html = `
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="calPrev()">&#8592;</button>
          <span class="cal-nav-label">${monthNames[month]} ${year}</span>
          <button class="cal-nav-btn" onclick="calNext()">&#8594;</button>
        </div>
        <div class="calendar-grid">`;

      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d =>
        html += `<div class="cal-header-day">${d}</div>`
      );

      for(let i = 0; i < firstDay; i++)
        html += `<div class="cal-day empty"></div>`;

      for(let d = 1; d <= daysInMonth; d++) {
        const isToday = isCurrentMonth && d === now.getDate();
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayTasks = allTasks.filter(t => t.due_date === dateStr);

        html += `<div class="cal-day ${isToday ? 'today' : ''}">
          <div class="cal-date-num">${d}</div>
          ${dayTasks.map(t => {
            let typeStr = "Task";
            const m = t.title.match(/^\[(.*?)\]\s*(.*)$/);
            if (m) { typeStr = m[1]; }
            
            let bg = "rgba(245,166,35,.15)", textCol = "#f5a623", bdr = "rgba(245,166,35,.25)";
            if(typeStr.toLowerCase() === "story") { bg = "rgba(168,85,247,.15)"; textCol = "#a855f7"; bdr = "rgba(168,85,247,.25)"; }
            else if(typeStr.toLowerCase() === "reel") { bg = "rgba(59,130,246,.15)"; textCol = "#3b82f6"; bdr = "rgba(59,130,246,.25)"; }
            else if(typeStr.toLowerCase() === "carousel") { bg = "rgba(34,197,94,.15)"; textCol = "#22c55e"; bdr = "rgba(34,197,94,.25)"; }
            else if(typeStr.toLowerCase() === "post" || typeStr.toLowerCase() === "static") { bg = "rgba(244,63,94,.15)"; textCol = "#f43f5e"; bdr = "rgba(244,63,94,.25)"; }

            const st = t.status || "need_to_start";
            const isDone = t.progress >= 100 || ["approved","done","posted","final"].includes(st);
            const statusColor =
              st === "posted"      ? "#20c997" :
              st === "final"       ? "#22d3ee" :
              st === "scheduled"   ? "#339af0" :
              st === "in_progress" ? "#B38B59" :
              st === "paused"      ? "#f59e0b" :
              st === "approved"    ? "#20c997" : "#8b8b93";
              
            return `<div class="cal-task ${isDone ? 'done' : ''}" style="background:${bg};color:${textCol};border:1px solid ${bdr};border-left:3px solid ${statusColor};text-align:center;" title="${t.title}" onclick="openTaskFeedback('${t.id}')">
              ${typeStr}
            </div>`;
          }).join('')}
        </div>`;
      }

      const remainder = (firstDay + daysInMonth) % 7;
      if(remainder > 0)
        for(let i = 0; i < (7 - remainder); i++)
          html += `<div class="cal-day empty"></div>`;

      html += `</div>`;
      root.innerHTML = html;
    }

    // ── TIMELINE LOGIC ────────────────────────────────────────────────────────
    function renderTimeline() {
      const root = document.getElementById("tl-root");
      if(!allTasks.length) { root.innerHTML = ""; return; }

      let minDate = new Date();
      let maxDate = new Date();
      maxDate.setMonth(maxDate.getMonth() + 1);

      allTasks.forEach(t => {
        if(t.start_date) { const s = new Date(t.start_date); if(s < minDate) minDate = s; }
        if(t.due_date)   { const d = new Date(t.due_date);   if(d > maxDate) maxDate = d; }
      });

      minDate.setDate(minDate.getDate() - 2);
      maxDate.setDate(maxDate.getDate() + 2);
      const totalMs = maxDate - minDate;

      let html = `<div class="tl-header">
        <div class="tl-col-task">Task / Deliverable</div>
        <div class="tl-col-chart">
          <div class="tl-month-marker">Timeline (${minDate.toISOString().slice(0,10)} → ${maxDate.toISOString().slice(0,10)})</div>
        </div>
      </div>`;

      allTasks.forEach(t => {
        const startStr = t.start_date || t.created_at || new Date().toISOString().slice(0,10);
        const endStr   = t.due_date   || maxDate.toISOString().slice(0,10);
        let start = new Date(startStr), end = new Date(endStr);
        if(start < minDate) start = minDate;
        if(end   > maxDate) end   = maxDate;
        if(start > end)     start = end;

        const leftPct  = ((start - minDate) / totalMs) * 100;
        let widthPct   = ((end   - start)   / totalMs) * 100;
        if(widthPct < 5) widthPct = 5;
        const isDone = t.progress >= 100 || ["approved","done","posted","final"].includes(t.status);

        html += `
          <div class="tl-row" style="cursor:pointer;" onclick="openTaskFeedback('${t.id}')">
            <div class="tl-info">
              <div class="tl-title">${t.title}</div>
              <div class="tl-dates">${startStr} to ${endStr}</div>
            </div>
            <div class="tl-track">
              <div class="tl-bar ${isDone?'done':''}" style="left:${leftPct}%;width:${widthPct}%">${t.progress||0}%</div>
            </div>
          </div>`;
      });

      root.innerHTML = html;
    }
    let currentFeedbackTask = null;

    function openTaskFeedback(taskId) {
      const task = allTasks.find(t => t.id === taskId);
      if(!task) return;
      currentFeedbackTask = task;
      
      document.getElementById('ft-title').textContent = task.title;
      document.getElementById('ft-date').textContent = task.due_date || 'No due date';
      document.getElementById('ft-status').textContent = task.status.replace(/_/g," ").replace(/\b\w/g, c => c.toUpperCase());
      document.getElementById('ft-comments').value = (task.feedback && task.feedback.comments) ? task.feedback.comments : "";
      
      const setField = (id, val, isLink) => {
        const el = document.getElementById(id);
        const container = document.getElementById(id + '-container');
        if (val) {
          container.style.display = 'block';
          if (isLink) { el.href = val; el.textContent = 'View Link'; }
          else { el.textContent = val; }
        } else {
          container.style.display = 'none';
        }
      };
      
      setField('ft-type', task.type);
      setField('ft-content', task.content || task.brief);
      setField('ft-idea', task.idea);
      setField('ft-scripts', task.scripts_copy);
      setField('ft-caption', task.caption);
      setField('ft-link', task.file_link, true);
      
      const banner = document.getElementById('ft-banner');
      if (task.feedback && task.feedback.status) {
        banner.style.display = 'block';
        banner.className = `feedback-banner ${task.feedback.status === 'approved' ? 'approved' : 'rejected'}`;
        banner.textContent = task.feedback.status === 'approved' ? ' You previously approved this task.' : ' You requested changes for this task.';
      } else {
        banner.style.display = 'none';
      }

      document.getElementById('task-feedback-modal').classList.add('active');
    }

    function closeTaskFeedback() {
      document.getElementById('task-feedback-modal').classList.remove('active');
      currentFeedbackTask = null;
    }

    async function submitTaskFeedback(status) {
      if(!currentFeedbackTask) return;
      const comments = document.getElementById('ft-comments').value;
      
      // If toggling off the current status (e.g. clicking "Approve" when already approved)
      if (status !== 'comment' && currentFeedbackTask.feedback && currentFeedbackTask.feedback.status === status) {
          status = '';
      }
      
      try {
        const btnApp = document.querySelector('.btn-approve');
        const btnRej = document.querySelector('.btn-reject');
        const btnCom = document.querySelector('.btn-comment');
        btnApp.disabled = true; btnRej.disabled = true; btnCom.disabled = true;
        
        const res = await fetch(`${API}/api/client-portal/tasks/${currentFeedbackTask.id}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            status,
            comments,
            source: currentFeedbackTask.source
          })
        });
        
        if (res.ok) {
          // Update local state to reflect feedback
          currentFeedbackTask.feedback = { status, comments };
          if(status === 'approved') {
             currentFeedbackTask.status = 'approved';
             currentFeedbackTask.progress = 100;
          } else if(status === 'changes_requested' || status === '') {
             currentFeedbackTask.status = 'pending_review';
          }
          // if status === 'comment', we leave currentFeedbackTask.status unchanged.
          closeTaskFeedback();
          renderViews();
        } else {
          alert('Failed to submit feedback.');
        }
      } catch (e) {
        alert('Error connecting to server.');
      } finally {
        const btnApp = document.querySelector('.btn-approve');
        const btnRej = document.querySelector('.btn-reject');
        const btnCom = document.querySelector('.btn-comment');
        btnApp.disabled = false; btnRej.disabled = false; btnCom.disabled = false;
      }
    }
  </script>

  <!-- TASK FEEDBACK MODAL -->
  <div class="modal-overlay" id="task-feedback-modal" onclick="if(event.target===this) closeTaskFeedback()">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Task Feedback</h2>
        <button class="btn-close" onclick="closeTaskFeedback()">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-task-detail">
          <div style="font-size:1.1rem;font-weight:700;color:var(--txt);margin-bottom:8px" id="ft-title"></div>
          <div>Due Date: <strong id="ft-date"></strong></div>
          <div>Current Status: <strong id="ft-status"></strong></div>
          <div id="ft-type-container" style="display:none;margin-top:8px">Type: <strong id="ft-type" style="color:var(--txt)"></strong></div>
          <div id="ft-content-container" style="display:none">Content: <strong id="ft-content" style="color:var(--txt)"></strong></div>
          <div id="ft-idea-container" style="display:none">Idea: <strong id="ft-idea" style="color:var(--txt)"></strong></div>
          <div id="ft-scripts-container" style="display:none;margin-top:8px">Scripts/ Copy: <strong id="ft-scripts" style="color:var(--txt);white-space:pre-wrap;display:block;margin-top:4px;padding:8px;background:var(--bg);border-radius:6px;border:1px solid var(--bdr);max-height:200px;overflow-y:auto"></strong></div>
          <div id="ft-caption-container" style="display:none;margin-top:8px">Caption: <strong id="ft-caption" style="color:var(--txt);white-space:pre-wrap;display:block;margin-top:4px;padding:8px;background:var(--bg);border-radius:6px;border:1px solid var(--bdr)"></strong></div>
          <div id="ft-link-container" style="display:none;margin-top:8px">File: <a href="#" id="ft-link" target="_blank" style="color:var(--acc);font-weight:bold;text-decoration:underline"></a></div>
        </div>
        <div id="ft-banner" class="feedback-banner"></div>
        <textarea id="ft-comments" class="feedback-textarea" placeholder="Leave a comment or request specific changes..."></textarea>
        <div class="modal-actions">
          <button class="btn-action btn-reject" onclick="submitTaskFeedback('changes_requested')"> Request Changes</button>
          <button class="btn-action btn-comment" onclick="submitTaskFeedback('comment')" style="background:var(--acc);color:white"> Leave Comment</button>
          <button class="btn-action btn-approve" onclick="submitTaskFeedback('approved')"> Approve</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
