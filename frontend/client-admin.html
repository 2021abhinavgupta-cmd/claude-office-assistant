<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Agency Admin | Agency Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg: #0c0c10; --s1: #131318; --s2: #1c1c24; --s3: #2a2a35; --bdr: rgba(255,255,255,0.07); --txt: #e8e8f0; --muted: #6b6b8a; --acc: #7c6fff; --acc-hover: #6a5ce8; --grn: #22d3a0; --red: #ff5c5c; --r: 12px; --rs: 8px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); display: flex; height: 100vh; overflow: hidden; }
    
    /* Sidebar */
    .sidebar { width: 280px; background: var(--s1); border-right: 1px solid var(--bdr); display: flex; flex-direction: column; }
    .sb-head { padding: 24px; border-bottom: 1px solid var(--bdr); }
    .sb-head h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
    .sb-list { flex: 1; overflow-y: auto; padding: 12px; }
    .cl-item { padding: 12px 16px; border-radius: var(--rs); cursor: pointer; transition: 0.2s; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .cl-item:hover { background: var(--s2); }
    .cl-item.active { background: rgba(124, 111, 255, 0.1); color: var(--acc); font-weight: 600; border-left: 3px solid var(--acc); }
    .cl-item .badge { font-size: 0.7rem; background: var(--s3); padding: 2px 6px; border-radius: 10px; color: var(--muted); }
    .sb-foot { padding: 16px; border-top: 1px solid var(--bdr); }
    .btn-logout { width: 100%; padding: 10px; border-radius: var(--rs); border: 1px solid var(--bdr); background: transparent; color: var(--muted); cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-logout:hover { color: var(--txt); background: var(--s2); }

    /* Main Area */
    .main { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    .topbar { padding: 24px 32px; border-bottom: 1px solid var(--bdr); display: flex; justify-content: space-between; align-items: center; }
    .topbar h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; }
    .content { flex: 1; padding: 32px; overflow-y: auto; }
    
    /* Empty State */
    .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }

    /* Client Details */
    .section-title { font-size: 1.1rem; font-family: 'Syne', sans-serif; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--bdr); display: flex; justify-content: space-between; align-items: center; }
    .btn-sm { padding: 6px 12px; background: var(--acc); color: #fff; border: none; border-radius: var(--rs); cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .btn-sm:hover { background: var(--acc-hover); }

    /* Task List */
    .task-card { background: var(--s1); border: 1px solid var(--bdr); border-radius: var(--r); padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .task-title { font-weight: 600; margin-bottom: 6px; }
    .task-meta { font-size: 0.8rem; color: var(--muted); display: flex; gap: 12px; }
    .task-meta span { display: flex; align-items: center; gap: 4px; }
    .task-actions { display: flex; gap: 8px; }
    .task-status { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .status-done { background: rgba(34, 211, 160, 0.15); color: var(--grn); }
    .status-prog { background: rgba(245, 166, 35, 0.15); color: #f5a623; }
    .status-wait { background: var(--s3); color: var(--muted); }

    /* Account Linking Form */
    .card { background: var(--s1); border: 1px solid var(--bdr); border-radius: var(--r); padding: 20px; margin-bottom: 32px; }
    .form-row { display: flex; gap: 16px; align-items: flex-end; }
    .form-group { flex: 1; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--s2); border: 1px solid var(--bdr); border-radius: var(--rs); color: var(--txt); font-family: 'DM Sans', sans-serif; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--acc); }

    /* Modals */
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--s1); border: 1px solid var(--bdr); border-radius: var(--r); padding: 24px; width: 100%; max-width: 450px; }
    .modal h3 { font-family: 'Syne', sans-serif; margin-bottom: 16px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .btn-ghost { padding: 10px 16px; background: transparent; border: 1px solid var(--bdr); color: var(--txt); border-radius: var(--rs); cursor: pointer; }
    .btn-ghost:hover { background: var(--s2); }
    .btn-primary { padding: 10px 16px; background: var(--acc); color: #fff; border: none; border-radius: var(--rs); cursor: pointer; font-weight: 600; }
    .btn-primary:hover { background: var(--acc-hover); }

  </style>
  <script src="shared-config.js"></script>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-head">
      <h1> Agency Admin</h1>
    </div>
    <div class="sb-list" id="client-list">
      <div style="padding: 20px; color: var(--muted); text-align: center; font-size: 0.9rem;">Loading clients...</div>
    </div>
    <div class="sb-foot">
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
  </div>

  <!-- Main Area -->
  <div class="main">
    <div class="topbar">
      <h2 id="topbar-title">Select a Client</h2>
      <div id="topbar-actions" style="display:none">
        <button class="btn-sm" onclick="openTaskModal()">+ New Task</button>
      </div>
    </div>
    
    <div class="content" id="main-content">
      <div class="empty-state">
        <div class="icon"></div>
        <p>Choose a client from the sidebar to manage their tasks and account.</p>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal">
      <h3 id="tm-title">Create Task</h3>
      <div class="form-group" style="margin-bottom: 16px">
        <label>Task Title</label>
        <input type="text" id="tm-input-title" placeholder="e.g., Q3 Marketing Strategy" />
      </div>
      <div class="form-group" style="margin-bottom: 16px">
        <label>Assign To (comma separated)</label>
        <input type="text" id="tm-input-assign" placeholder="e.g., Abhinav, Nupur" />
      </div>
      <div class="form-group" style="margin-bottom: 16px">
        <label>Due Date</label>
        <input type="date" id="tm-input-date" />
      </div>
      <div class="form-group" style="margin-bottom: 16px; display:none" id="tm-status-group">
        <label>Status</label>
        <select id="tm-input-status">
          <option value="not_started">Not Started</option>
          <option value="in_progress">In Progress</option>
          <option value="in_review">In Review</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeTaskModal()">Cancel</button>
        <button class="btn-primary" id="tm-save-btn" onclick="saveTask()">Save Task</button>
      </div>
    </div>
  </div>

  <script>
    const API = location.hostname === "localhost" || location.hostname === "127.0.0.1" ? "http://localhost:5000" : location.origin;
    
    letDashboardData = { clients: [] };
    let portalAccounts = [];
    let selectedClient = null;
    let editingTaskId = null;

    // Initialization
    async function init() {
      // 1. Verify Admin Session
      const v = await fetch(`${API}/api/auth/admin_portal_verify`).catch(()=>null);
      if(!v || !v.ok) { window.location.href = "login.html"; return; }

      // 2. Load Notion Clients & Tasks
      await fetchDashboardData();
      
      // 3. Load Portal Accounts (SQLite)
      await fetchPortalAccounts();
      
      renderSidebar();
    }

    async function fetchDashboardData() {
      const res = await fetch(`${API}/api/notion/dashboard`);
     DashboardData = await res.json();
    }

    async function fetchPortalAccounts() {
      const res = await fetch(`${API}/api/auth/clients`);
      const data = await res.json();
      portalAccounts = data.clients || [];
    }

    function renderSidebar() {
      const list = document.getElementById("client-list");
      if(!dashboardData.clients ||DashboardData.clients.length === 0) {
        list.innerHTML = `<div style="padding: 20px; color: var(--muted); text-align: center; font-size: 0.9rem;">No clients found in Notion.</div>`;
        return;
      }

      list.innerHTML =DashboardData.clients.map(c => `
        <div class="cl-item ${selectedClient && selectedClient.notion_id === c.notion_id ? 'active' : ''}" onclick="selectClient('${c.notion_id}')">
          <span>${c.name}</span>
          <span class="badge">${c.tasks ? c.tasks.length : 0} tasks</span>
        </div>
      `).join("");
    }

    function selectClient(notionId) {
      selectedClient =DashboardData.clients.find(c => c.notion_id === notionId);
      renderSidebar();
      renderMain();
    }

    function renderMain() {
      if(!selectedClient) return;

      document.getElementById("topbar-title").textContent = selectedClient.name;
      document.getElementById("topbar-actions").style.display = "block";

      const c = selectedClient;
      
      // Find matching portal account
      const portalAcc = portalAccounts.find(p => p.client_notion_id === c.notion_id);

      let html = `
        <div class="card">
          <div class="section-title">
            Portal Account Link
            ${portalAcc ? `<span class="badge" style="background:var(--grn);color:#000;padding:4px 8px;border-radius:4px;font-size:0.7rem;">Linked to @${portalAcc.username}</span>` : `<span class="badge" style="background:var(--s3);color:var(--muted);padding:4px 8px;border-radius:4px;font-size:0.7rem;">Not Linked</span>`}
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Link to existing Portal Account</label>
              <select id="link-account-select">
                <option value="">-- Select an account --</option>
                ${portalAccounts.map(p => `<option value="${p.id}" ${portalAcc && portalAcc.id === p.id ? 'selected' : ''}>@${p.username} (${p.client_name})</option>`).join("")}
              </select>
            </div>
            <button class="btn-sm" style="padding:10px 16px" onclick="linkAccount()">Save Link</button>
          </div>
        </div>

        <div class="section-title" style="margin-top: 24px">
          Tasks
        </div>
      `;

      if(!c.tasks || c.tasks.length === 0) {
        html += `<div style="padding: 30px; background: var(--s1); border-radius: var(--r); text-align: center; color: var(--muted); border: 1px dashed var(--bdr);">No tasks for this client yet.</div>`;
      } else {
        // Sort tasks: pending first, then by date
        const sortedTasks = [...c.tasks].sort((a,b) => {
          if(a.status === 'done' && b.status !== 'done') return 1;
          if(a.status !== 'done' && b.status === 'done') return -1;
          return new Date(b.due_date || '2099') - new Date(a.due_date || '2099');
        });

        html += sortedTasks.map(t => {
          let stClass = "status-wait";
          let stLabel = (t.status || "not_started").replace(/_/g, " ");
          if(t.status === "done" || t.status === "approved") stClass = "status-done";
          else if(t.status === "in_progress" || t.status === "in_review" || t.status === "submitted") stClass = "status-prog";

          return `
            <div class="task-card">
              <div>
                <div class="task-title">${t.title}</div>
                <div class="task-meta">
                  <span class="task-status ${stClass}">${stLabel}</span>
                  <span> ${t.due_date || "No date"}</span>
                  <span> ${t.assigned_to || "Unassigned"}</span>
                </div>
              </div>
              <div class="task-actions">
                <button class="btn-sm" style="background:var(--s3);color:var(--txt)" onclick='openTaskModal(${JSON.stringify(t).replace(/'/g, "&#39;")})'>Edit</button>
              </div>
            </div>
          `;
        }).join("");
      }

      document.getElementById("main-content").innerHTML = html;
    }

    async function linkAccount() {
      const select = document.getElementById("link-account-select");
      const portalId = select.value;
      if(!portalId) { alert("Select an account first."); return; }

      const res = await fetch(`${API}/api/auth/clients/${portalId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ client_notion_id: selectedClient.notion_id })
      });
      const data = await res.json();
      if(data.success) {
        await fetchPortalAccounts(); // refresh
        renderMain();
      } else {
        alert("Error linking account: " + (data.error || "Unknown"));
      }
    }

    function openTaskModal(task = null) {
      document.getElementById("task-modal").style.display = "flex";
      if(task) {
        editingTaskId = task.notion_id;
        document.getElementById("tm-title").textContent = "Edit Task";
        document.getElementById("tm-input-title").value = task.title;
        document.getElementById("tm-input-assign").value = task.assigned_to;
        document.getElementById("tm-input-date").value = task.due_date || "";
        document.getElementById("tm-status-group").style.display = "block";
        document.getElementById("tm-input-status").value = task.status || "not_started";
      } else {
        editingTaskId = null;
        document.getElementById("tm-title").textContent = "Create Task";
        document.getElementById("tm-input-title").value = "";
        document.getElementById("tm-input-assign").value = "";
        document.getElementById("tm-input-date").value = "";
        document.getElementById("tm-status-group").style.display = "none";
      }
    }

    function closeTaskModal() {
      document.getElementById("task-modal").style.display = "none";
    }

    async function saveTask() {
      const btn = document.getElementById("tm-save-btn");
      const title = document.getElementById("tm-input-title").value.trim();
      const assign = document.getElementById("tm-input-assign").value.trim();
      const date = document.getElementById("tm-input-date").value;
      const status = document.getElementById("tm-input-status").value;

      if(!title) { alert("Title is required"); return; }
      btn.textContent = "Saving...";
      btn.disabled = true;

      try {
        if(editingTaskId) {
          // Update existing
          await fetch(`${API}/api/notion/tasks/${editingTaskId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ new_title: title, assigned_to: assign, due_date: date, status: status })
          });
        } else {
          // Create new
          await fetch(`${API}/api/notion/tasks`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              title: title, 
              assigned_to: assign, 
              due_date: date, 
              client_name: selectedClient.name,
              client_id: selectedClient.notion_id
            })
          });
        }

        // Refresh data
        await fetchDashboardData();
        selectClient(selectedClient.notion_id); // re-render
        closeTaskModal();
      } catch(e) {
        alert("Failed to save task.");
      }
      
      btn.textContent = "Save Task";
      btn.disabled = false;
    }

    async function logout() {
      await fetch(`${API}/api/auth/admin_portal_logout`, { method: "POST" });
      window.location.href = "login.html";
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
